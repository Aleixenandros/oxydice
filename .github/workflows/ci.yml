name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Ejecuta las actions de JavaScript en Node 24 (Node 20 está obsoleto).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: linux }
          - { os: macos-latest, label: macos }
          - { os: windows-latest, label: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependencias del sistema (linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Formato
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --locked
